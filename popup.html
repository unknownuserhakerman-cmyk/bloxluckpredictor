<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Blox Predict</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-width:280px;max-width:380px;padding:16px;color:#fff}
.c{text-align:center}
.l{width:50px;height:50px;margin:0 auto 8px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 20px rgba(102,126,234,0.3)}
h1{font-size:16px}
.s{font-size:9px;color:#888;margin-bottom:12px}
.b{background:rgba(255,255,255,0.04);border-radius:8px;padding:10px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.05)}
.r{display:flex;justify-content:space-between;align-items:center}
.dt{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.dt.g{background:#0f8;box-shadow:0 0 6px #0f8}
.dt.r{background:#f44;box-shadow:0 0 6px #f44}
.pd{font-size:20px;font-weight:800;letter-spacing:1px}
.pd.g{color:#0f8}.pd.r{color:#f44}
.bb{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin:6px 0}
.br{height:100%;border-radius:3px;transition:width .3s}
.br.g{background:linear-gradient(90deg,#0c6,#0f8)}
.br.r{background:linear-gradient(90deg,#c33,#f44)}
.gr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.gi{background:rgba(255,255,255,0.02);border-radius:5px;padding:6px}
.gn{font-size:12px;font-weight:700}
.gl{font-size:7px;color:#666;text-transform:uppercase}
.bt{width:100%;padding:8px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.bt.p{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;margin-bottom:5px}
.bt.d{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff}
.lg{margin-top:8px;background:rgba(0,0,0,0.2);border-radius:5px;padding:6px;font-size:8px;font-family:monospace;color:#888;text-align:left;display:none;max-height:40px;overflow-y:auto}
.lg.s{display:block}
.ft{margin-top:8px;font-size:7px;color:#333}
</style>
</head>
<body>
<div class="c">
<div class="l">🎲</div>
<h1>Blox Predict</h1>
<div class="s">Heads or Tails Analyzer</div>
<div class="b">
<div class="r">
<span><span class="dt g" id="sd"></span><span id="st" style="font-size:11px">Active</span></span>
<span style="font-size:9px;color:#888" id="ud">👤 -</span>
</div>
</div>
<div class="b">
<div class="pd g" id="pt">HEADS</div>
<div class="bb"><div class="br g" id="cb" style="width:70%"></div></div>
<div class="r" style="font-size:10px">
<span>Win: <b id="wt">70%</b></span>
<span id="bs" style="color:#0f8;font-weight:700">🟢 BET</span>
</div>
</div>
<div class="gr">
<div class="gi"><div class="gn" id="hp">50%</div><div class="gl">Heads</div></div>
<div class="gi"><div class="gn" id="tp">50%</div><div class="gl">Tails</div></div>
<div class="gi"><div class="gn" id="tg">0</div><div class="gl">Games</div></div>
</div>
<button class="bt p" id="rf">⟳ Refresh</button>
<button class="bt d" id="gb">⚡ Analyze</button>
<div class="lg" id="lb">[Ready]</div>
<div class="ft">Blox Predict v1.0</div>
</div>
<script src="popup.js"></script>
</body>
</html>
